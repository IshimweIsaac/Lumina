name: Bug Report
description: Report a bug or unexpected behavior in Lumina
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Create a .lum file with...
        2. Run `lumina run file.lum`
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or diagnostic codes (e.g., R001, L011).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Lumina Version
      description: Output of `lumina --version`
      placeholder: e.g., 2.1.3
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x64)
        - Linux (ARM64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows (x64)
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or .lum file contents.
    validations:
      required: false
