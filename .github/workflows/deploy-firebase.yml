name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  build_binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: lumina-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: lumina-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: lumina-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lumina-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build lumina
        run: cargo build --release --target ${{ matrix.target }} -p lumina-cli

      - name: Build lumina-lsp
        run: cargo build --release --target ${{ matrix.target }} -p lumina-lsp

      - name: Prepare binaries and checksums
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/lumina-cli.exe dist/${{ matrix.binary }}
            cp target/${{ matrix.target }}/release/lumina-lsp.exe dist/${{ matrix.binary }}-lsp.exe
          else
            cp target/${{ matrix.target }}/release/lumina-cli dist/${{ matrix.binary }}
            cp target/${{ matrix.target }}/release/lumina-lsp dist/${{ matrix.binary }}-lsp
          fi
          
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.binary }} > ${{ matrix.binary }}.sha256
            sha256sum ${{ matrix.binary }}-lsp* > ${{ matrix.binary }}-lsp.sha256
          else
            shasum -a 256 ${{ matrix.binary }} > ${{ matrix.binary }}.sha256
            shasum -a 256 ${{ matrix.binary }}-lsp* > ${{ matrix.binary }}-lsp.sha256
          fi

      - name: Generate Linux Installer (.deb)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd installers/linux
          chmod +x build_deb.sh
          ./build_deb.sh 2.0.0 target/${{ matrix.target }}/release
          mv ../../lumina-setup-linux-amd64.deb ../../dist/

      - name: Generate macOS Installer (.pkg)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          cd installers/macos
          chmod +x build_pkg.sh
          ./build_pkg.sh 2.0.0 target/${{ matrix.target }}/release
          mv ../../lumina-setup-macos.pkg ../../dist/

      - name: Install NSIS
        if: ${{ matrix.os == 'windows-latest' }}
        run: choco install nsis -y

      - name: Generate Windows Installer (.exe)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          cd installers/windows
          makensis /DTARGET=${{ matrix.target }} lumina.nsi
          mv Lumina-v2.0.0-x64-Setup.exe ../../dist/

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.binary }}
          path: dist/*
          retention-days: 1

  deploy_website:
    needs: build_binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install website dependencies
        run: cd website && npm install
        
      - name: Build website
        run: cd website && npm run build
        
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: website/dist
          merge-multiple: true

      - name: Build VS Code Extension
        run: |
          cd extensions/lumina-vscode
          npm install
          npx @vscode/vsce package
          cp *.vsix ../../website/dist/ || true

      - name: Copy install script
        run: cp install.sh website/dist/
        
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUMINA_LANG }}
          channelId: live
          projectId: lumina-lang
